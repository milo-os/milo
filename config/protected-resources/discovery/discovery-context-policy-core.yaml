apiVersion: discovery.miloapis.com/v1alpha1
kind: DiscoveryContextPolicy
metadata:
  name: core-kubernetes-resources
spec:
  rules:
    - group: ""
      resources: ["pods", "services", "configmaps", "secrets", "namespaces",
                  "persistentvolumeclaims", "serviceaccounts", "endpoints", "events",
                  "resourcequotas", "limitranges"]
      contexts: ["Project"]
    - group: "apps"
      resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
      contexts: ["Project"]
    - group: "batch"
      resources: ["jobs", "cronjobs"]
      contexts: ["Project"]
    - group: "networking.k8s.io"
      resources: ["ingresses", "networkpolicies"]
      contexts: ["Project"]
    - group: "rbac.authorization.k8s.io"
      resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
      contexts: ["Platform"]
    - group: "apiextensions.k8s.io"
      resources: ["customresourcedefinitions"]
      contexts: ["Platform"]
    - group: "apiregistration.k8s.io"
      resources: ["apiservices"]
      contexts: ["Platform"]
    - group: "authentication.k8s.io"
      resources: ["selfsubjectreviews", "tokenreviews"]
      contexts: ["Platform"]
    - group: "authorization.k8s.io"
      resources: ["localsubjectaccessreviews", "selfsubjectaccessreviews", "selfsubjectrulesreviews", "subjectaccessreviews"]
      contexts: ["Platform"]
    - group: "flowcontrol.apiserver.k8s.io"
      resources: ["flowschemas", "prioritylevelconfigurations"]
      contexts: ["Platform"]
