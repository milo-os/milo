apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: notification-contact-reader
  annotations:
    kubernetes.io/display-name: Notification Contact Viewer
    kubernetes.io/description: View notification contacts
spec:
  launchStage: Beta
  includedPermissions:
    # Read-only permissions for contact resources
    - notification.miloapis.com/contacts.get
    - notification.miloapis.com/contacts.list
    - notification.miloapis.com/contacts.watch
