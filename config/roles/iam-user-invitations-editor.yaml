apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: iam-user-invitations-editor
  annotations:
    kubernetes.io/display-name: User Invitation Editor
    kubernetes.io/description: Create, update, and delete user invitations
spec:
  launchStage: Beta
  inheritedRoles:
    - name: iam-user-invitations-reader
  includedPermissions:
    - iam.miloapis.com/userinvitations.create
    - iam.miloapis.com/userinvitations.update
    - iam.miloapis.com/userinvitations.patch
    - iam.miloapis.com/userinvitations.delete
