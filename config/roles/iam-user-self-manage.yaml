apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: iam-user-self-manage
  labels:
    taxonomy.miloapis.com/role-category: service
  annotations:
    kubernetes.io/display-name: User Self Manage
    kubernetes.io/description: "Allows users to manage their own user account."
    taxonomy.miloapis.com/product: Identity & Access Management
    taxonomy.miloapis.com/sort-order: "40"
spec:
  launchStage: Beta
  includedPermissions:
  - iam.miloapis.com/users.get
  - iam.miloapis.com/users.update
  - iam.miloapis.com/users.patch
  - iam.miloapis.com/users.delete
  - resourcemanager.miloapis.com/organizationmemberships.list
  - resourcemanager.miloapis.com/organizationmemberships.get
  - resourcemanager.miloapis.com/organizationmemberships.delete
  - identity.miloapis.com/sessions.list
  - identity.miloapis.com/sessions.get
  - identity.miloapis.com/sessions.delete
  - identity.miloapis.com/useridentities.list
  - identity.miloapis.com/useridentities.get
  - iam.miloapis.com/userinvitations.get
  - iam.miloapis.com/userinvitations.list
  - iam.miloapis.com/userinvitations.watch
  - notification.miloapis.com/contacts.list
  - notification.miloapis.com/contactgroups.list
  - notification.miloapis.com/contactgroupmemberships.list
  - notification.miloapis.com/contactgroupmembershipremovals.list  
  - notification.miloapis.com/contactgroupmemberships.create
  - notification.miloapis.com/contactgroupmembershipremovals.create
  - notification.miloapis.com/contactgroupmembershipremovals.delete
