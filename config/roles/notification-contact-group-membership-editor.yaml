apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: notification-contact-group-membership-editor
  labels:
    taxonomy.miloapis.com/role-category: feature
  annotations:
    kubernetes.io/display-name: Contact Group Membership Editor
    kubernetes.io/description: Create, update, and delete notification contact group memberships
    taxonomy.miloapis.com/product: Notifications
    taxonomy.miloapis.com/sort-order: "20"
spec:
  launchStage: Beta
  inheritedRoles:
    - name: notification-contact-group-membership-reader
  includedPermissions:
    - notification.miloapis.com/contactgroupmemberships.create
    - notification.miloapis.com/contactgroupmemberships.update
    - notification.miloapis.com/contactgroupmemberships.patch
    - notification.miloapis.com/contactgroupmemberships.delete
