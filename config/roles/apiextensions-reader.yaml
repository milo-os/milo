apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: apiextensions-reader
  labels:
    taxonomy.miloapis.com/role-category: service
  annotations:
    kubernetes.io/display-name: API Extensions Viewer
    kubernetes.io/description: View access to custom resource definitions
    taxonomy.miloapis.com/product: "Platform Core"
    taxonomy.miloapis.com/sort-order: "40"
spec:
  launchStage: Beta
  includedPermissions:
    # Read-only permissions for API Extensions resources
    - apiextensions.k8s.io/customresourcedefinitions.get
    - apiextensions.k8s.io/customresourcedefinitions.list
    - apiextensions.k8s.io/customresourcedefinitions.watch
