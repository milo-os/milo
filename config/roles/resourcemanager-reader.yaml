apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: resourcemanager-reader
  annotations:
    kubernetes.io/display-name: Resource Manager Viewer
    kubernetes.io/description: View access to organizations and projects
spec:
  launchStage: Beta
  includedPermissions:
    # Read-only permissions for ResourceManager resources
    - resourcemanager.miloapis.com/organizations.get
    - resourcemanager.miloapis.com/organizations.watch
    - resourcemanager.miloapis.com/projects.get
    - resourcemanager.miloapis.com/projects.list
    - resourcemanager.miloapis.com/projects.watch
