apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: notification-email-creator
  labels:
    taxonomy.miloapis.com/role-category: feature
  annotations:
    kubernetes.io/display-name: Notification Email Creator
    kubernetes.io/description: Create notification emails
    taxonomy.miloapis.com/product: Notifications
    taxonomy.miloapis.com/sort-order: "20"
spec:
  launchStage: Beta
  inheritedRoles:
    - name: notification-email-reader
  includedPermissions:
    # Create-only permissions for Email resources (notifications cannot be updated or deleted)
    - notification.miloapis.com/emails.create
