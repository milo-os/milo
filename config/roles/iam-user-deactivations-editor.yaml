apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: iam-user-deactivations-editor
  annotations:
    kubernetes.io/display-name: User Deactivation Editor
    kubernetes.io/description: Create, update, and delete user deactivations
spec:
  launchStage: Beta
  inheritedRoles:
    - name: iam-user-deactivations-reader
  includedPermissions:
    - iam.miloapis.com/userdeactivations.create
    - iam.miloapis.com/userdeactivations.update
    - iam.miloapis.com/userdeactivations.patch
    - iam.miloapis.com/userdeactivations.delete
