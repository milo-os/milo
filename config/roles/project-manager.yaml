apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: project-manager
  labels:
    taxonomy.miloapis.com/role-category: service
  annotations:
    kubernetes.io/display-name: Project Manager
    kubernetes.io/description: Full access to projects including create, update, and delete
    taxonomy.miloapis.com/product: Organization & Projects
    taxonomy.miloapis.com/sort-order: "20"
spec:
  launchStage: Beta
  includedPermissions:
    - resourcemanager.miloapis.com/projects.create
    - resourcemanager.miloapis.com/projects.get
    - resourcemanager.miloapis.com/projects.list
    - resourcemanager.miloapis.com/projects.update
    - resourcemanager.miloapis.com/projects.delete
    - resourcemanager.miloapis.com/projects.patch
    - resourcemanager.miloapis.com/projects.watch
