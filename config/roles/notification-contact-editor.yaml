apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: notification-contact-editor
  annotations:
    kubernetes.io/display-name: Notification Contact Editor
    kubernetes.io/description: Create, update, and delete notification contacts
spec:
  launchStage: Beta
  inheritedRoles:
    - name: notification-contact-reader
  includedPermissions:
    - notification.miloapis.com/contacts.create
    - notification.miloapis.com/contacts.update
    - notification.miloapis.com/contacts.patch
    - notification.miloapis.com/contacts.delete
