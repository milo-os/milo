apiVersion: iam.miloapis.com/v1alpha1
kind: Role
metadata:
  name: notification-contact-group-editor
  labels:
    taxonomy.miloapis.com/role-category: feature
  annotations:
    kubernetes.io/display-name: Notification Contact Group Editor
    kubernetes.io/description: Create, update, and delete notification contact groups
    taxonomy.miloapis.com/product: Notifications
    taxonomy.miloapis.com/sort-order: "20"
spec:
  launchStage: Beta
  inheritedRoles:
    - name: notification-contact-group-reader
  includedPermissions:
    - notification.miloapis.com/contactgroups.create
    - notification.miloapis.com/contactgroups.update
    - notification.miloapis.com/contactgroups.patch
    - notification.miloapis.com/contactgroups.delete
