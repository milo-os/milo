apiVersion: discovery.miloapis.com/v1alpha1
kind: DiscoveryContextPolicy
metadata:
  name: core-kubernetes-resources
spec:
  rules:
    - group: ""
      resources: ["configmaps", "secrets", "namespaces", "endpoints", "events"]
      contexts: ["Project"]
    - group: "rbac.authorization.k8s.io"
      resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
      contexts: ["Platform"]
    - group: "apiextensions.k8s.io"
      resources: ["customresourcedefinitions"]
      contexts: ["Platform"]
    - group: "apiregistration.k8s.io"
      resources: ["apiservices"]
      contexts: ["Platform"]
    - group: "authentication.k8s.io"
      resources: ["selfsubjectreviews", "tokenreviews"]
      contexts: ["Platform"]
    - group: "authorization.k8s.io"
      resources: ["localsubjectaccessreviews", "selfsubjectaccessreviews", "selfsubjectrulesreviews", "subjectaccessreviews"]
      contexts: ["Platform"]
    - group: "flowcontrol.apiserver.k8s.io"
      resources: ["flowschemas", "prioritylevelconfigurations"]
      contexts: ["Platform"]
    - group: "coordination.k8s.io"
      resources: ["leases"]
      contexts: ["Platform"]
    - group: "admissionregistration.k8s.io"
      resources: ["mutatingwebhookconfigurations", "validatingadmissionpolicies", "validatingadmissionpolicybindings", "validatingwebhookconfigurations"]
      contexts: ["Platform"]
