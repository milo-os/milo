      families:
        - name: milo_user_invitations_created_timestamp
          help: "Creation timestamp of IAM user invitations"
          type: gauge
          metrics:
            - value: "double(timestamp(object.metadata.creationTimestamp).getSeconds())"
              labels:
                - name: name
