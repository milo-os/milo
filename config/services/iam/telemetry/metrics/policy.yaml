          help: "Information about IAM machine accounts"
          type: gauge
          metrics:
            - labels:
                - name: name
                  value: "object.metadata.name"
                - name: namespace
                  value: "object.metadata.namespace"
                - name: uid
                  value: "object.metadata.uid"

    - name: iam-machine-accounts-created-timestamp
      resource:
        group: iam.miloapis.com
        version: v1alpha1
        resource: machineaccounts
      families:
        - name: milo_machine_accounts_created_timestamp
          help: "Creation timestamp of IAM machine accounts"
          type: gauge
          metrics:
            - value: "double(timestamp(object.metadata.creationTimestamp).getSeconds())"
              labels:
                - name: name
                  value: "object.metadata.name"
                - name: namespace
                  value: "object.metadata.namespace"

    # iam.miloapis.com: PolicyBinding
    - name: iam-policy-bindings-info
      resource:
        group: iam.miloapis.com
        version: v1alpha1
        resource: policybindings
      families:
        - name: milo_policy_bindings_info
          help: "Information about IAM policy bindings"
          type: gauge
          metrics:
            - labels:
                - name: name
                  value: "object.metadata.name"
                - name: namespace
                  value: "object.metadata.namespace"
                - name: uid
                  value: "object.metadata.uid"

    - name: iam-policy-bindings-created-timestamp
      resource:
        group: iam.miloapis.com
        version: v1alpha1
        resource: policybindings
      families:
        - name: milo_policy_bindings_created_timestamp
          help: "Creation timestamp of IAM policy bindings"
          type: gauge
          metrics:
            - value: "double(timestamp(object.metadata.creationTimestamp).getSeconds())"
              labels:
                - name: name
                  value: "object.metadata.name"
                - name: namespace
                  value: "object.metadata.namespace"

    - name: iam-policy-bindings-status-condition
      resource:
        group: iam.miloapis.com
        version: v1alpha1
        resource: policybindings
      families:
        - name: milo_policy_bindings_status_condition
          help: "Status conditions for IAM policy bindings"
          type: gauge
          metrics:
            - forEach: "object.status.conditions"
              value: "item.status == 'True' ? 1.0 : 0.0"
              labels:
                - name: name
                  value: "object.metadata.name"
                - name: namespace
                  value: "object.metadata.namespace"
                - name: condition
                  value: "item.type"
                - name: reason
                  value: "item.reason"
                - name: status
                  value: "item.status"

    # iam.miloapis.com: ProtectedResource
