apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: notification.miloapis.com-contactgroup
spec:
  resource:
    apiGroup: notification.miloapis.com
    kind: ContactGroup

  auditRules:
    - name: create-with-displayname
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec) && has(audit.requestObject.spec.displayName)"
      summary: "{{ actor }} created contact group {{ link(audit.requestObject.spec.displayName, audit.objectRef) }}"

    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created contact group {{ link(audit.objectRef.name, audit.objectRef) }}"

    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted contact group {{ audit.objectRef.name }}"

    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated contact group {{ link(audit.objectRef.name, audit.objectRef) }}"
