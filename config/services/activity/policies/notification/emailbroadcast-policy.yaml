apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: notification.miloapis.com-emailbroadcast
spec:
  resource:
    apiGroup: notification.miloapis.com
    kind: EmailBroadcast

  auditRules:
    - name: create-with-displayname-and-group
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec) && has(audit.requestObject.spec.displayName) && has(audit.requestObject.spec.contactGroupRef)"
      summary: "{{ actor }} scheduled broadcast {{ audit.requestObject.spec.displayName }} to {{ audit.requestObject.spec.contactGroupRef.name }}"

    - name: create-with-group
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec) && has(audit.requestObject.spec.contactGroupRef)"
      summary: "{{ actor }} scheduled a broadcast to {{ audit.requestObject.spec.contactGroupRef.name }}"

    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} scheduled an email broadcast"

    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} cancelled broadcast {{ audit.objectRef.name }}"
