# ActivityPolicy for ResourceGrant resources.
# Tracks when admins explicitly grant quota allowances to consumers (orgs, projects, users).
#
# IMPORTANT: For DELETE operations, audit.requestObject is a DeleteOptions (not the resource),
# so we use audit.responseObject to access the resource spec if available.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: quota.miloapis.com-resourcegrant
spec:
  resource:
    apiGroup: quota.miloapis.com
    kind: ResourceGrant

  auditRules:
    - name: create-with-consumer
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec) && has(audit.requestObject.spec.consumerRef)"
      summary: "{{ actor }} granted quota to {{ audit.requestObject.spec.consumerRef.kind }} {{ audit.requestObject.spec.consumerRef.name }}"

    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created a quota grant"

    - name: delete-with-consumer
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec) && has(audit.responseObject.spec.consumerRef)"
      summary: "{{ actor }} revoked quota from {{ audit.responseObject.spec.consumerRef.kind }} {{ audit.responseObject.spec.consumerRef.name }}"

    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} revoked a quota grant"

    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated quota grant {{ link(audit.objectRef.name, audit.objectRef) }}"
