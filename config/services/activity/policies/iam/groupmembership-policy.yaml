# ActivityPolicy for GroupMembership resources.
# Defines how GroupMembership API operations appear in activity timelines.
#
# Audit rules handle CRUD operations captured by the Kubernetes API server audit log.
# No eventRules — the controller sets conditions but does not emit Kubernetes Events.
#
# Design principles:
# - Use spec.userRef.name for the member and spec.groupRef.name for the group
# - Human-readable phrasing: "added X to group Y", "removed X from group Y"
# - For delete, responseObject carries the deleted resource spec; fall back to objectRef.name
# - Exclude system actors to reduce reconciliation noise
#
# IMPORTANT: For DELETE operations, audit.requestObject is a DeleteOptions (not the resource),
# so we use audit.responseObject to access the resource spec if available.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: iam.miloapis.com-groupmembership
spec:
  resource:
    apiGroup: iam.miloapis.com
    kind: GroupMembership

  auditRules:
    - name: create-with-userref
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec) && has(audit.requestObject.spec.userRef) && has(audit.requestObject.spec.groupRef)"
      summary: "{{ actor }} added {{ audit.requestObject.spec.userRef.name }} to group {{ audit.requestObject.spec.groupRef.name }}"

    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} added a member to the group"

    - name: delete-with-userref
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec) && has(audit.responseObject.spec.userRef) && has(audit.responseObject.spec.groupRef)"
      summary: "{{ actor }} removed {{ audit.responseObject.spec.userRef.name }} from group {{ audit.responseObject.spec.groupRef.name }}"

    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} removed a member from the group"

    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated group membership {{ link(audit.objectRef.name, audit.objectRef) }}"
