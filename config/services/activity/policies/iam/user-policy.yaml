apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: iam.miloapis.com-user
spec:
  resource:
    apiGroup: iam.miloapis.com
    kind: User

  auditRules:
    - name: create-with-email
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec) && has(audit.requestObject.spec.email)"
      summary: "{{ actor }} created user {{ audit.requestObject.spec.email }}"

    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created user {{ audit.objectRef.name }}"

    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted user {{ audit.objectRef.name }}"

    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated user {{ link(audit.objectRef.name, audit.objectRef) }}"
