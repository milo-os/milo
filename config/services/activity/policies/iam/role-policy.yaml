apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: iam.miloapis.com-role
spec:
  resource:
    apiGroup: iam.miloapis.com
    kind: Role

  auditRules:
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created role {{ link(audit.objectRef.name, audit.objectRef) }}"

    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted role {{ audit.objectRef.name }}"

    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated role {{ link(audit.objectRef.name, audit.objectRef) }}"
