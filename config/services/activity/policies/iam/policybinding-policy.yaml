# ActivityPolicy for PolicyBinding resources.
# Defines how PolicyBinding API operations appear in activity timelines.
#
# Audit rules handle CRUD operations captured by the Kubernetes API server audit log.
# No eventRules — the controller sets conditions but does not emit Kubernetes Events.
#
# Design principles:
# - Surface the role and subject where available
# - "Granted"/"removed" phrasing for role assignment operations
# - Safe access to subjects array: check has(spec.subjects) before indexing
# - Exclude system actors to reduce reconciliation noise
#
# Note: spec.roleRef and spec.subjects are available when the audit level is Request
# or higher. Fallback rules handle Metadata-level audit logs gracefully.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: iam.miloapis.com-policybinding
spec:
  resource:
    apiGroup: iam.miloapis.com
    kind: PolicyBinding

  # Audit log rules for CRUD operations.
  # All rules exclude system components (!audit.user.username.startsWith('system:'))
  # so controller reconciliation doesn't generate activity noise.
  auditRules:
    # Create with role and subject available
    - name: create-with-role-and-subject
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec) && has(audit.requestObject.spec.roleRef) && has(audit.requestObject.spec.subjects) && size(audit.requestObject.spec.subjects) > 0"
      summary: "{{ actor }} granted {{ audit.requestObject.spec.roleRef.name }} to {{ audit.requestObject.spec.subjects[0].name }}"

    # Create with role only
    - name: create-with-role
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec) && has(audit.requestObject.spec.roleRef)"
      summary: "{{ actor }} granted role {{ audit.requestObject.spec.roleRef.name }}"

    # Create fallback
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created a role binding"

    # Delete — role binding removed
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} removed role binding {{ audit.objectRef.name }}"

    # Update
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated role binding {{ link(audit.objectRef.name, audit.objectRef) }}"
