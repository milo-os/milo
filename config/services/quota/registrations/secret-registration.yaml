apiVersion: quota.miloapis.com/v1alpha1
kind: ResourceRegistration
metadata:
  name: secrets-per-project
  labels:
    app.kubernetes.io/name: milo
    app.kubernetes.io/component: quota-system
    services.miloapis.com/owner: core.miloapis.com
  annotations:
    kubernetes.io/display-name: "Secrets"
    kubernetes.io/description: "Maximum number of secrets that can be created within a project"
spec:
  consumerType:
    apiGroup: resourcemanager.miloapis.com
    kind: Project

  type: Entity

  resourceType: core.miloapis.com/secrets

  description: "Maximum number of secrets that can be created within a project"

  baseUnit: secret
  displayUnit: secrets
  unitConversionFactor: 1

  claimingResources:
    - apiGroup: ""
      kind: Secret
