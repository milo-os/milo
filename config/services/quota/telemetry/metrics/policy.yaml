                  value: "object.metadata.name"

    - name: quota-resource-registration-current-generation
      resource:
        group: quota.miloapis.com
        version: v1alpha1
        resource: resourceregistrations
      families:
        - name: milo_quota_registration_current_generation
          help: "The current generation for the registration"
          type: gauge
          metrics:
            - value: "double(object.metadata.generation)"
              labels:
                - name: name
                  value: "object.metadata.name"
