apiVersion: quota.miloapis.com/v1alpha1
kind: ClaimCreationPolicy
metadata:
  name: project-secret-claim-policy
  labels:
    app.kubernetes.io/name: milo
    app.kubernetes.io/component: quota-system
spec:
  trigger:
    resource:
      apiVersion: v1
      kind: Secret
  target:
    resourceClaimTemplate:
      metadata:
        name: "secret-{{ trigger.metadata.name }}"
        namespace: "{{requestInfo.namespace}}"
        labels:
          app.kubernetes.io/name: milo
          app.kubernetes.io/component: quota-system
        annotations:
          kubernetes.io/description: "Automatic quota claim for Secret creation"
      spec:
        requests:
          - resourceType: core.miloapis.com/secrets
            amount: 1
