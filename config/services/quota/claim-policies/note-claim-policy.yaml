apiVersion: quota.miloapis.com/v1alpha1
kind: ClaimCreationPolicy
metadata:
  name: project-note-claim-policy
  labels:
    app.kubernetes.io/name: milo
    app.kubernetes.io/component: quota-system
spec:
  trigger:
    resource:
      apiVersion: notes.miloapis.com/v1alpha1
      kind: Note
  target:
    resourceClaimTemplate:
      metadata:
        name: "note-{{ trigger.metadata.name }}"
        namespace: "{{requestInfo.namespace}}"
        labels:
          app.kubernetes.io/name: milo
          app.kubernetes.io/component: quota-system
        annotations:
          kubernetes.io/description: "Automatic quota claim for Note creation"
      spec:
        requests:
          - resourceType: notes.miloapis.com/notes
            amount: 1
