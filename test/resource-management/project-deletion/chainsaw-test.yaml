apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: project-deletion
spec:
  description: |
    Tests Project deletion and resource cleanup.

    This test verifies:
    - A project can be deleted after reaching Ready status
    - The ResourceCleanup condition progresses through the expected states
    - The project is fully removed from both organization and main cluster contexts

  clusters:
    main:
      kubeconfig: kubeconfig-main
    org:
      kubeconfig: kubeconfig-org-template

  steps:
    - name: setup-organization
      description: Create Organization, User, and OrganizationMembership for project testing
      try:
        - apply:
            file: 01-test-organization.yaml
        - wait:
            apiVersion: v1
            kind: Namespace
            name: organization-test-project-deletion-org
            timeout: 30s
            for:
              jsonPath:
                path: '{.status.phase}'
                value: Active
        - apply:
            file: 02-test-user.yaml
        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: User
            name: "user-admin"
            timeout: 30s
            for:
              condition:
                name: Ready
                value: 'True'
        - apply:
            file: 03-organization-membership.yaml

    - name: create-project-and-wait-for-ready
      description: Create Project in organization context and verify it reaches Ready status
      cluster: org
      try:
        - apply:
            file: 04-test-project.yaml
        - wait:
            apiVersion: resourcemanager.miloapis.com/v1alpha1
            kind: Project
            name: project-deletion-test
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'
        - assert:
            file: assertions/assert-project-ready.yaml

    - name: delete-project
      description: Delete the project and verify cleanup completes
      cluster: org
      try:
        - delete:
            ref:
              apiVersion: resourcemanager.miloapis.com/v1alpha1
              kind: Project
              name: project-deletion-test
        - wait:
            apiVersion: resourcemanager.miloapis.com/v1alpha1
            kind: Project
            name: project-deletion-test
            timeout: 120s
            for:
              deletion: {}

    - name: verify-project-gone-from-main-cluster
      description: Verify the project no longer exists in the main cluster
      cluster: main
      try:
        - script:
            timeout: 30s
            content: |
              kubectl --kubeconfig kubeconfig-main get project project-deletion-test 2>&1 | grep -q "NotFound"
