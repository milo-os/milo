apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: contact-group-enrollment
spec:
  description: |
    End-to-end tests for the ContactGroupEnrollmentController.

    This test verifies the following scenarios:
    1. A Contact with a User SubjectRef is automatically enrolled into a ContactGroup
       when a matching ContactGroupEnrollmentPolicy exists.
    2. A Contact without a User SubjectRef is NOT enrolled (selector filtering).
    3. A Contact with a pre-existing ContactGroupMembershipRemoval is NOT enrolled
       (opt-out is honored).
    4. Enrollment is idempotent — a second reconciliation does not create duplicate
       ContactGroupMembership records.
    5. An existing Contact is enrolled retroactively when a new
       ContactGroupEnrollmentPolicy is applied (the policy watcher triggers re-evaluation).
    6. Full pipeline: creating a User triggers UserContactController to create a Contact,
       which in turn triggers enrollment via ContactGroupEnrollmentPolicy.

  concurrent: false
  steps:

  # -----------------------------------------------------------------------
  # Setup: create the shared ContactGroup and basic enrollment policy
  # -----------------------------------------------------------------------
  - name: setup-contact-group
    description: Create the ContactGroup used across all scenarios
    try:
    - apply:
        file: 01-contact-group.yaml
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: ContactGroup
          metadata:
            name: enrollment-test-group
            namespace: milo-system

  - name: setup-basic-policy
    description: Create the basic ContactGroupEnrollmentPolicy targeting User contacts
    try:
    - apply:
        file: 02-basic-policy.yaml
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: ContactGroupEnrollmentPolicy
          metadata:
            name: enrollment-basic-policy

  # -----------------------------------------------------------------------
  # Scenario 1: Contact with User SubjectRef is enrolled
  # -----------------------------------------------------------------------
  - name: enroll-user-contact
    description: Create a Contact with a User SubjectRef and verify a ContactGroupMembership is created
    try:
    - apply:
        file: 03-user-contact.yaml
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: Contact
          metadata:
            name: enrollment-user-contact
            namespace: milo-system
    - wait:
        apiVersion: notification.miloapis.com/v1alpha1
        kind: ContactGroupMembership
        name: enrollment-enrollment-basic-policy-enrollment-user-contact
        namespace: milo-system
        timeout: 30s
        for:
          condition:
            name: Ready
            value: 'Unknown'
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: ContactGroupMembership
          metadata:
            name: enrollment-enrollment-basic-policy-enrollment-user-contact
            namespace: milo-system
            labels:
              enrollment.notification.miloapis.com/policy: enrollment-basic-policy
          spec:
            contactRef:
              name: enrollment-user-contact
              namespace: milo-system
            contactGroupRef:
              name: enrollment-test-group
              namespace: milo-system
    catch:
    - script:
        timeout: 10s
        content: |
          echo "=== ContactGroupMemberships in milo-system ==="
          kubectl get contactgroupmemberships -n milo-system -o wide 2>&1 || true
          echo "=== Contact annotations ==="
          kubectl get contact enrollment-user-contact -n milo-system -o jsonpath='{.metadata.annotations}' 2>&1 || true

  # -----------------------------------------------------------------------
  # Scenario 1b: Enrollment annotation is written to the Contact
  # -----------------------------------------------------------------------
  - name: verify-enrollment-annotation
    description: Verify the enrollment annotation is written to the Contact after evaluation
    try:
    - script:
        timeout: 30s
        content: |
          for i in $(seq 1 15); do
            annotation=$(kubectl get contact enrollment-user-contact -n milo-system \
              -o jsonpath='{.metadata.annotations.enrollment\.notification\.miloapis\.com/enrollment-basic-policy}' 2>/dev/null || echo "")
            if [ "$annotation" = "true" ]; then
              echo "Enrollment annotation is set correctly"
              exit 0
            fi
            echo "Waiting for enrollment annotation... (attempt $i)"
            sleep 2
          done
          echo "Enrollment annotation was not set in time"
          kubectl get contact enrollment-user-contact -n milo-system -o yaml 2>&1
          exit 1

  # -----------------------------------------------------------------------
  # Scenario 2: Contact without User SubjectRef is NOT enrolled
  # -----------------------------------------------------------------------
  - name: no-enrollment-for-bare-contact
    description: Create a Contact without a SubjectRef and verify no membership is created
    try:
    - apply:
        file: 04-bare-contact.yaml
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: Contact
          metadata:
            name: enrollment-bare-contact
            namespace: milo-system
    # Wait for the controller to annotate the bare contact (proves it was evaluated)
    - script:
        timeout: 30s
        content: |
          for i in $(seq 1 15); do
            annotation=$(kubectl get contact enrollment-bare-contact -n milo-system \
              -o jsonpath='{.metadata.annotations.enrollment\.notification\.miloapis\.com/enrollment-basic-policy}' 2>/dev/null || echo "")
            if [ "$annotation" = "true" ]; then
              echo "Bare contact was evaluated (annotation set)"
              exit 0
            fi
            echo "Waiting for evaluation annotation... (attempt $i)"
            sleep 2
          done
          echo "Evaluation annotation was not set in time"
          exit 1
    # Assert that no membership was created for the bare contact
    - error:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: ContactGroupMembership
          metadata:
            namespace: milo-system
          spec:
            contactRef:
              name: enrollment-bare-contact
              namespace: milo-system
        timeout: 10s

  # -----------------------------------------------------------------------
  # Scenario 3: Opt-out (ContactGroupMembershipRemoval) is honored
  # -----------------------------------------------------------------------
  - name: setup-opt-out-removal
    description: Create a ContactGroupMembershipRemoval before the opted-out contact is created
    try:
    - apply:
        file: 05-opted-out-removal.yaml
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: ContactGroupMembershipRemoval
          metadata:
            name: enrollment-opt-out-removal
            namespace: milo-system

  - name: no-enrollment-when-opted-out
    description: Create a Contact that has a pre-existing opt-out and verify no membership is created
    try:
    - apply:
        file: 06-opted-out-contact.yaml
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: Contact
          metadata:
            name: enrollment-opted-out-contact
            namespace: milo-system
    # Wait for the controller to evaluate and annotate
    - script:
        timeout: 30s
        content: |
          for i in $(seq 1 15); do
            annotation=$(kubectl get contact enrollment-opted-out-contact -n milo-system \
              -o jsonpath='{.metadata.annotations.enrollment\.notification\.miloapis\.com/enrollment-basic-policy}' 2>/dev/null || echo "")
            if [ "$annotation" = "true" ]; then
              echo "Opted-out contact was evaluated"
              exit 0
            fi
            echo "Waiting for evaluation annotation... (attempt $i)"
            sleep 2
          done
          echo "Evaluation annotation was not set in time"
          exit 1
    # Assert that no membership was created despite the contact having a User SubjectRef
    - error:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: ContactGroupMembership
          metadata:
            namespace: milo-system
          spec:
            contactRef:
              name: enrollment-opted-out-contact
              namespace: milo-system
            contactGroupRef:
              name: enrollment-test-group
              namespace: milo-system
        timeout: 10s

  # -----------------------------------------------------------------------
  # Scenario 4: Enrollment is idempotent
  # -----------------------------------------------------------------------
  - name: enrollment-is-idempotent
    description: Re-triggering reconciliation on an already-enrolled Contact does not create duplicates
    try:
    - script:
        timeout: 10s
        content: |
          # Touch the contact to force a re-reconciliation
          kubectl annotate contact enrollment-user-contact -n milo-system \
            test.miloapis.com/idempotency-check="$(date +%s)" --overwrite
    - script:
        timeout: 30s
        content: |
          sleep 5
          count=$(kubectl get contactgroupmemberships -n milo-system \
            -l enrollment.notification.miloapis.com/policy=enrollment-basic-policy \
            --field-selector spec.contactRef.name=enrollment-user-contact \
            -o json | jq '.items | length')
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly 1 membership, got $count (idempotency check failed)"
            kubectl get contactgroupmemberships -n milo-system -o wide 2>&1
            exit 1
          fi
          echo "Idempotency check passed: exactly 1 membership exists"

  # -----------------------------------------------------------------------
  # Scenario 5: Retroactive enrollment of existing contacts when a new policy is applied
  # -----------------------------------------------------------------------
  - name: create-contact-before-policy
    description: Create a Contact before its enrollment policy exists
    try:
    - apply:
        file: 07-existing-contact.yaml
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: Contact
          metadata:
            name: enrollment-existing-contact
            namespace: milo-system

  - name: apply-retroactive-policy
    description: Apply a new policy and verify existing contacts are enrolled retroactively
    try:
    - apply:
        file: 08-retroactive-policy.yaml
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: ContactGroupEnrollmentPolicy
          metadata:
            name: enrollment-retroactive-policy
    - wait:
        apiVersion: notification.miloapis.com/v1alpha1
        kind: ContactGroupMembership
        name: enrollment-enrollment-retroactive-policy-enrollment-existing-contact
        namespace: milo-system
        timeout: 30s
        for:
          condition:
            name: Ready
            value: 'Unknown'
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: ContactGroupMembership
          metadata:
            name: enrollment-enrollment-retroactive-policy-enrollment-existing-contact
            namespace: milo-system
          spec:
            contactRef:
              name: enrollment-existing-contact
              namespace: milo-system
            contactGroupRef:
              name: enrollment-test-group
              namespace: milo-system
    catch:
    - script:
        timeout: 10s
        content: |
          echo "=== All ContactGroupMemberships in milo-system ==="
          kubectl get contactgroupmemberships -n milo-system -o wide 2>&1 || true
          echo "=== enrollment-existing-contact annotations ==="
          kubectl get contact enrollment-existing-contact -n milo-system -o jsonpath='{.metadata.annotations}' 2>&1 || true

  # -----------------------------------------------------------------------
  # Scenario 6: Full pipeline — User creation triggers enrollment
  # -----------------------------------------------------------------------
  - name: full-pipeline-user-signup
    description: |
      Create a User and verify the full enrollment chain:
        User → (UserContactController) → Contact → (ContactGroupEnrollmentController) → ContactGroupMembership
    try:
    - apply:
        file: 09-signup-user.yaml
    # Wait for UserContactController to create the Contact
    - wait:
        apiVersion: notification.miloapis.com/v1alpha1
        kind: Contact
        name: user-enrollment-signup-user
        namespace: milo-system
        timeout: 30s
        for:
          jsonPath:
            path: '{.spec.subject.name}'
            value: enrollment-signup-user
    # Wait for the enrollment controller to create the membership
    - wait:
        apiVersion: notification.miloapis.com/v1alpha1
        kind: ContactGroupMembership
        name: enrollment-enrollment-basic-policy-user-enrollment-signup-user
        namespace: milo-system
        timeout: 30s
        for:
          condition:
            name: Ready
            value: 'Unknown'
    - assert:
        resource:
          apiVersion: notification.miloapis.com/v1alpha1
          kind: ContactGroupMembership
          metadata:
            name: enrollment-enrollment-basic-policy-user-enrollment-signup-user
            namespace: milo-system
          spec:
            contactRef:
              name: user-enrollment-signup-user
              namespace: milo-system
            contactGroupRef:
              name: enrollment-test-group
              namespace: milo-system
    catch:
    - script:
        timeout: 10s
        content: |
          echo "=== User status ==="
          kubectl get user enrollment-signup-user -o yaml 2>&1 || true
          echo "=== Contacts in milo-system ==="
          kubectl get contacts -n milo-system -o wide 2>&1 || true
          echo "=== ContactGroupMemberships in milo-system ==="
          kubectl get contactgroupmemberships -n milo-system -o wide 2>&1 || true

  # -----------------------------------------------------------------------
  # Cleanup
  # -----------------------------------------------------------------------
  - name: cleanup
    description: Remove all resources created by this test
    try:
    - script:
        timeout: 60s
        content: |
          # Enrollment policies (cluster-scoped)
          kubectl delete contactgroupenrollmentpolicy enrollment-basic-policy --ignore-not-found
          kubectl delete contactgroupenrollmentpolicy enrollment-retroactive-policy --ignore-not-found

          # Contacts
          kubectl delete contact enrollment-user-contact -n milo-system --ignore-not-found
          kubectl delete contact enrollment-bare-contact -n milo-system --ignore-not-found
          kubectl delete contact enrollment-opted-out-contact -n milo-system --ignore-not-found
          kubectl delete contact enrollment-existing-contact -n milo-system --ignore-not-found
          kubectl delete contact user-enrollment-signup-user -n milo-system --ignore-not-found

          # ContactGroupMembershipRemoval
          kubectl delete contactgroupmembershipremoval enrollment-opt-out-removal -n milo-system --ignore-not-found

          # ContactGroupMemberships created by the controller
          kubectl delete contactgroupmembership \
            enrollment-enrollment-basic-policy-enrollment-user-contact \
            enrollment-enrollment-retroactive-policy-enrollment-existing-contact \
            enrollment-enrollment-basic-policy-user-enrollment-signup-user \
            -n milo-system --ignore-not-found

          # User
          kubectl delete user enrollment-signup-user --ignore-not-found

          # ContactGroup
          kubectl delete contactgroup enrollment-test-group -n milo-system --ignore-not-found

          echo "Cleanup completed"
